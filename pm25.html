<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbz3AmkU5p41BylPgtwzitxgS2dAZOpFt_URs_Xw-atsXfVyYw_Eyxz7ENB6g_-xQeQbUw/exec';

    async function fetchAQI() {
        const valueEl = document.getElementById('pm25-value');
        const statusEl = document.getElementById('aqi-status');

        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            console.log("GAS 回傳診斷資料:", data);

            if (data.records && data.records.length > 0) {
                // 1. 先試著找竹東
                let station = data.records.find(s => s.sitename.includes('竹東'));
                
                // 2. 如果沒竹東，就拿第一個找到的（可能是新竹、湖口、竹北等）
                if (!station) {
                    station = data.records[0];
                    console.warn("找不到竹東，自動切換至備案測站:", station.sitename);
                }

                document.getElementById('name').innerText = station.sitename + "站";
                document.getElementById('pm25-value').innerText = station['pm2.5'] || '0';
                document.getElementById('aqi-status').innerText = station.status;
            } else {
                document.getElementById('aqi-status').innerText = "目前清單中無新竹地區測站";
            }
        } catch (err) {
            document.getElementById('aqi-status').innerText = "讀取失敗";
        }
    }
    fetchAQI();
</script>
