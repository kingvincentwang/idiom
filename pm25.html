<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>竹東站即時監測</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 280px; }
        #val { font-size: 4rem; font-weight: bold; margin: 10px 0; color: #2ecc71; }
        #status { font-weight: bold; color: #7f8c8d; }
        .time { font-size: 0.8rem; color: #bbb; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="name">竹東監測站</h2>
    <div id="val">--</div>
    <div id="status">讀取中...</div>
    <div class="time">更新時間：<span id="time">--</span></div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbz3AmkU5p41BylPgtwzitxgS2dAZOpFt_URs_Xw-atsXfVyYw_Eyxz7ENB6g_-xQeQbUw/exec';

    async function updateData() {
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            
            if (data.status === "success") {
                // 對應 GAS 回傳的新格式
                document.getElementById('val').innerText = data.pm25;
                document.getElementById('time').innerText = data.time;
                document.getElementById('status').innerText = "監測項目：PM2.5";
                
                // 數值變色判斷
                const v = parseFloat(data.pm25);
                const valEl = document.getElementById('val');
                if (v >= 35) valEl.style.color = '#e67e22';
                else if (v >= 15) valEl.style.color = '#f1c40f';
                else valEl.style.color = '#27ae60';
            } else {
                document.getElementById('status').innerText = "伺服器忙碌中";
            }
        } catch (e) {
            document.getElementById('status').innerText = "連線失敗";
        }
    }

    updateData();
</script>
</body>
</html>
