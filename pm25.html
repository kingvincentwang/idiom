<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PM2.5 監測</title>
</head>
<body>
    <div style="text-align:center; font-family:sans-serif; padding:20px; border:1px solid #ccc; border-radius:10px; width:200px;">
        <h3>竹東站 PM2.5</h3>
        <h1 id="display-val">--</h1>
        <p id="display-status">讀取中...</p>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbz3AmkU5p41BylPgtwzitxgS2dAZOpFt_URs_Xw-atsXfVyYw_Eyxz7ENB6g_-xQeQbUw/exec';

        async function fetchAQI() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                
                if (data.records && data.records.length > 0) {
                    const station = data.records[0];
                    document.getElementById('display-val').innerText = station['pm2.5'];
                    document.getElementById('display-status').innerText = station['status'];
                    // 根據數值變色
                    const val = parseFloat(station['pm2.5']);
                    document.getElementById('display-val').style.color = (val > 35) ? 'orange' : 'green';
                } else {
                    document.getElementById('display-status').innerText = '找不到資料';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('display-status').innerText = '連線失敗';
            }
        }
        fetchAQI();
    </script>
</body>
</html>
