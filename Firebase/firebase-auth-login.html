<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會員系統 - Google 登入</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a2a6c, #2a4d8f, #1f6f8b);
    padding: 20px;
  }
  .card {
    width: 100%;
    max-width: 400px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    text-align: center;
  }
  h1 {
    font-size: 22px;
    color: #1a2a6c;
    margin-bottom: 24px;
  }
  .btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn-google {
    background: #fff;
    color: #444;
    border: 1px solid #ccc;
  }
  .btn-google:hover { background: #f5f5f5; }
  .btn-google svg { width: 20px; height: 20px; }
  .btn-logout { background: #b0413e; color: #fff; margin-top: 16px; }
  .btn-logout:hover { background: #8e332f; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .msg {
    margin-top: 14px;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
    line-height: 1.6;
  }
  .msg.error { display: block; background: #fdecea; color: #b0413e; }
  #user-panel { display: none; }
  #user-photo {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    margin-bottom: 12px;
    border: 3px solid #2a4d8f;
  }
  #user-name { font-size: 18px; font-weight: bold; color: #1a2a6c; }
  #user-email { font-size: 14px; color: #666; margin-top: 4px; word-break: break-all; }
</style>
</head>
<body>

<div class="card">
  <!-- 登入面板 -->
  <div id="auth-panel">
    <h1>🔐 會員系統</h1>
    <button class="btn btn-google" id="google-btn" onclick="handleGoogleLogin()">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      使用 Google 帳號登入
    </button>
    <div class="msg" id="msg"></div>
  </div>

  <!-- 登入成功後的會員面板 -->
  <div id="user-panel">
    <h1>👋 歡迎回來</h1>
    <img id="user-photo" src="" alt="頭像" referrerpolicy="no-referrer">
    <div id="user-name"></div>
    <div id="user-email"></div>
    <button class="btn btn-logout" onclick="handleLogout()">登出</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // ★★★ 請換成你自己的 Firebase 設定 ★★★
  const firebaseConfig = {
    apiKey: "AIzaSyA_er0I9K3yMwFvkYNLNow4tPEAG7PAl50",
    authDomain: "member-login-5c129.firebaseapp.com",
    projectId: "member-login-5c129",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // 若只想讓學校網域帳號登入，取消下面這行的註解（僅是提示，仍需搭配後續驗證）
  // provider.setCustomParameters({ hd: 'gses.hcc.edu.tw' });

  // ===== Google 登入 =====
  window.handleGoogleLogin = async function () {
    const btn = document.getElementById('google-btn');
    btn.disabled = true;
    hideMsg();
    try {
      await signInWithPopup(auth, provider);
      // 成功後 onAuthStateChanged 會自動切換畫面
    } catch (err) {
      showMsg(translateError(err.code), 'error');
    } finally {
      btn.disabled = false;
    }
  };

  // ===== 登出 =====
  window.handleLogout = async function () {
    await signOut(auth);
  };

  // ===== 登入狀態監聽（重整頁面保持登入）=====
  onAuthStateChanged(auth, (user) => {
    const authPanel = document.getElementById('auth-panel');
    const userPanel = document.getElementById('user-panel');
    if (user) {
      authPanel.style.display = 'none';
      userPanel.style.display = 'block';
      document.getElementById('user-photo').src = user.photoURL || '';
      document.getElementById('user-name').textContent = user.displayName || '';
      document.getElementById('user-email').textContent = user.email || '';
    } else {
      authPanel.style.display = 'block';
      userPanel.style.display = 'none';
    }
  });

  function translateError(code) {
    const map = {
      'auth/popup-closed-by-user': '登入視窗被關閉，請再試一次',
      'auth/cancelled-popup-request': '登入請求被取消，請再試一次',
      'auth/popup-blocked': '登入視窗被瀏覽器封鎖，請允許彈出視窗',
      'auth/unauthorized-domain': '此網域未授權，請到 Firebase Console 的已授權網域加入目前網域',
      'auth/network-request-failed': '網路連線失敗，請檢查網路',
      'auth/operation-not-allowed': 'Google 登入尚未啟用，請到 Firebase Console 開啟',
    };
    return map[code] || ('發生錯誤：' + code);
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }
  function hideMsg() {
    document.getElementById('msg').className = 'msg';
  }
</script>

</body>
</html>
