<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公司內部留言板 - 企業高效溝通平台</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f7ff',
              100: '#e0effe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
            }
          }
        }
      }
    }
  </script>
  <!-- Google Fonts: Noto Sans TC -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
    }
    .glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .dark .glass {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen transition-colors duration-300">

  <!-- 背景裝飾光暈 -->
  <div class="fixed -top-40 -left-40 w-96 h-96 bg-blue-400/20 rounded-full blur-3xl pointer-events-none"></div>
  <div class="fixed top-1/2 -right-40 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none"></div>

  <!-- 頂部導覽列 -->
  <header class="sticky top-0 z-40 w-full border-b border-slate-200/80 dark:border-slate-800/80 glass transition-colors">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <!-- 左側 LOGO 與標題 -->
      <div class="flex items-center space-x-3">
        <div class="p-2 bg-brand-500 text-white rounded-xl shadow-lg shadow-brand-500/30">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
        </div>
        <div>
          <span class="text-lg font-bold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-700 dark:from-white dark:to-slate-300">
            公司內部留言板
          </span>
          <span class="ml-2 px-1.5 py-0.5 text-[10px] font-bold bg-green-500/10 text-green-600 dark:text-green-400 rounded">內部專用</span>
        </div>
      </div>

      <!-- 中間設計者標示與連結 -->
      <div class="hidden md:flex items-center justify-center">
        <a href="https://drive.google.com/drive/folders/1eZR-N-dRkpqH83o5CjhzYzqeSbTCkRBs" target="_blank" class="px-4 py-1.5 rounded-xl border border-slate-200/60 dark:border-slate-800/60 bg-slate-100/40 hover:bg-slate-200/50 dark:bg-slate-900/40 dark:hover:bg-slate-800/50 text-xs text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 transition-all flex items-center space-x-2 shadow-sm group">
          <span class="font-medium">設計者：Vincent Wang</span>
          <span class="text-slate-300 dark:text-slate-700">|</span>
          <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-indigo-500 dark:from-blue-400 dark:to-indigo-400 font-bold tracking-wide">Powered By Gemini</span>
          <svg class="w-3.5 h-3.5 opacity-50 group-hover:opacity-100 group-hover:translate-x-0.5 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
          </svg>
        </a>
      </div>

      <!-- 右側控制元件與狀態 -->
      <div class="flex items-center space-x-3">
        <!-- 深色模式切換 -->
        <button id="themeToggleBtn" class="p-2 rounded-xl bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition-all" title="切換主題">
          <svg id="sunIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.364l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <svg id="moonIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        </button>

        <!-- 連線狀態指示標籤 -->
        <div id="connectionStatusBadge" class="px-3 py-1.5 rounded-xl text-xs font-semibold flex items-center space-x-1.5 bg-amber-500/10 text-amber-600 dark:text-amber-400">
          <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
          <span id="statusText">偵測環境中...</span>
        </div>
      </div>
    </div>
  </header>

  <!-- 主內容區 -->
  <main class="max-w-6xl mx-auto px-4 py-8">
    
    <!-- 中間連結 (行動裝置專用) -->
    <div class="md:hidden mb-6 flex justify-center">
      <a href="https://drive.google.com/drive/folders/1eZR-N-dRkpqH83o5CjhzYzqeSbTCkRBs" target="_blank" class="px-4 py-2 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-xs text-slate-500 dark:text-slate-400 flex items-center space-x-1.5 shadow-sm">
        <span>設計者：Vincent Wang</span>
        <span>|</span>
        <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-indigo-500 dark:from-blue-400 dark:to-indigo-400 font-bold">Powered By Gemini</span>
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
        </svg>
      </a>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      
      <!-- 左側：填寫表單 (占 5 格) -->
      <section class="lg:col-span-5 space-y-6">
        <div class="p-6 rounded-3xl border border-slate-200/60 dark:border-slate-800/60 glass shadow-xl">
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-bold flex items-center space-x-2">
              <span class="w-1.5 h-6 bg-brand-500 rounded-full"></span>
              <span>撰寫新留言</span>
            </h2>
            <span class="text-xs text-slate-400 dark:text-slate-500">不限字數，溫馨和諧</span>
          </div>

          <form id="messageForm" class="space-y-5">
            <!-- 匿名發言切換 -->
            <div class="flex items-center justify-between p-3 bg-slate-100/50 dark:bg-slate-800/30 rounded-2xl">
              <div class="flex items-center space-x-2.5">
                <svg class="w-5 h-5 text-slate-500 dark:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                <div>
                  <label for="anonymousToggle" class="text-sm font-bold block cursor-pointer">使用匿名身份發言</label>
                  <span class="text-[11px] text-slate-400 dark:text-slate-500 block">保護個人隱私，意見直達決策層</span>
                </div>
              </div>
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="anonymousToggle" class="sr-only peer">
                <div class="w-11 h-6 bg-slate-300 dark:bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:after:bg-slate-900 dark:after:border-slate-700 peer-checked:bg-brand-500"></div>
              </label>
            </div>

            <!-- 姓名欄位 -->
            <div id="nameInputWrapper" class="space-y-1.5">
              <label for="nameInput" class="text-xs font-bold text-slate-500 dark:text-slate-400">您的稱呼 / 姓名</label>
              <input type="text" id="nameInput" placeholder="例如：研發部 小明" class="w-full px-4 py-3 rounded-2xl bg-slate-100/60 hover:bg-slate-100 dark:bg-slate-900/60 dark:hover:bg-slate-900 border border-slate-200 dark:border-slate-800 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition-all placeholder:text-slate-400" required>
            </div>

            <!-- 部門標籤 -->
            <div class="space-y-1.5">
              <label for="deptSelect" class="text-xs font-bold text-slate-500 dark:text-slate-400">相關部門分類</label>
              <select id="deptSelect" class="w-full px-4 py-3 rounded-2xl bg-slate-100/60 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-800 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition-all">
                <option value="一般通用">一般通用 / 全體</option>
                <option value="技術研發">技術研發部</option>
                <option value="市場行銷">市場行銷部</option>
                <option value="人力資源">人力資源部 (HR)</option>
                <option value="行政總務">行政總務部</option>
                <option value="產品設計">產品設計部</option>
              </select>
            </div>

            <!-- 留言內容 -->
            <div class="space-y-1.5">
              <div class="flex items-center justify-between">
                <label for="messageInput" class="text-xs font-bold text-slate-500 dark:text-slate-400">留言內容</label>
                <span id="charCounter" class="text-[11px] text-slate-400 dark:text-slate-500 font-mono">0 / 500</span>
              </div>
              <textarea id="messageInput" rows="6" maxlength="500" placeholder="請在此輸入您想說的話、建議、回饋或感謝..." class="w-full px-4 py-3 rounded-2xl bg-slate-100/60 hover:bg-slate-100 dark:bg-slate-900/60 dark:hover:bg-slate-900 border border-slate-200 dark:border-slate-800 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition-all placeholder:text-slate-400 resize-none" required></textarea>
            </div>

            <!-- 提交按鈕 -->
            <button type="submit" id="submitBtn" class="w-full py-4 bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 text-white font-bold rounded-2xl shadow-lg shadow-brand-500/20 hover:shadow-brand-500/30 hover:-translate-y-0.5 active:translate-y-0 transition-all flex items-center justify-center space-x-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
              </svg>
              <span>送出留言</span>
            </button>
          </form>
        </div>
      </section>

      <!-- 右側：留言顯示看板 (占 7 格) -->
      <section class="lg:col-span-7 space-y-6">
        
        <!-- 分頁切換頁籤 -->
        <div class="flex border-b border-slate-200 dark:border-slate-800">
          <button id="tabPublic" class="flex-1 pb-4 text-center font-bold text-sm border-b-2 border-brand-500 text-brand-500 transition-all flex items-center justify-center space-x-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <span>公司公用公告欄</span>
          </button>
          <button id="tabOutbox" class="flex-1 pb-4 text-center font-bold text-sm border-b-2 border-transparent text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-all flex items-center justify-center space-x-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
            </svg>
            <span>本地發送紀錄</span>
            <span id="outboxBadge" class="hidden px-2 py-0.5 text-[10px] bg-brand-500 text-white rounded-full">0</span>
          </button>
        </div>

        <!-- 搜尋與過濾 -->
        <div class="flex flex-col sm:flex-row gap-3">
          <div class="relative flex-1">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
            </span>
            <input type="text" id="searchInput" placeholder="搜尋留言內容、姓名或部門..." class="w-full pl-10 pr-4 py-2.5 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 outline-none focus:border-brand-500 transition-all text-sm">
          </div>
          <button id="refreshBtn" class="px-4 py-2.5 bg-white dark:bg-slate-900 hover:bg-slate-100 dark:hover:bg-slate-800 border border-slate-200 dark:border-slate-800 rounded-2xl transition-all flex items-center justify-center space-x-1 text-sm font-semibold">
            <svg id="refreshIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 15.19M9 15.19l1.107-1.107m0 0A3 3 0 1114 15.19"/>
            </svg>
            <span>重新整理</span>
          </button>
        </div>

        <!-- 留言列表區 -->
        <div id="messageListContainer" class="space-y-4">
          <!-- 留言卡片由 JS 動態生成 -->
        </div>

        <!-- 空白狀態提示 -->
        <div id="emptyState" class="hidden py-20 text-center space-y-4 border border-dashed border-slate-200 dark:border-slate-800 rounded-3xl">
          <div class="inline-flex p-4 bg-slate-100 dark:bg-slate-900 text-slate-400 rounded-2xl">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0a2 2 0 01-2 2H6a2 2 0 01-2-2m16 0V9a2 2 0 00-2-2H6a2 2 0 00-2 2v4.5m12-3l-3 3m0 0l-3-3m3 3V10"/>
            </svg>
          </div>
          <div>
            <h3 class="font-bold text-slate-500 dark:text-slate-400">目前沒有任何留言</h3>
            <p class="text-xs text-slate-400 dark:text-slate-500 mt-1">成為第一個在這個看板上發言的人吧！</p>
          </div>
        </div>

      </section>

    </div>
  </main>

  <!-- Toast 訊息提示元件 -->
  <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col space-y-3 pointer-events-none"></div>

  <!-- JS 邏輯腳本 -->
  <script>
    // =========================================================================
    // 【 🔑 關鍵設定：請在下方雙引號內貼上您的 Google Apps Script Web App 部署網址 】
    // =========================================================================
    const GAS_DEPLOY_URL = "https://script.google.com/macros/s/AKfycbxmNf9KwbWP2sMT8C_2_JI8Byzn2cDe0pvwzOxkuKhA_3HqNO3-CJRKDI9qA2uEdaDVCQ/exec";


    // --- 狀態管理 ---
    let state = {
      theme: 'dark',
      apiUrl: GAS_DEPLOY_URL, // 直接讀取上方 hardcode 的變數
      activeTab: 'public',    // 'public' | 'outbox'
      searchTerm: '',
      publicMessages: [],     // 從試算表實際取得的留言
      outboxMessages: [],     // 個人在此瀏覽器發送的留言紀錄
      // 模擬示範資料 (當沒有設定 API 或仍為預設網址時使用)
      mockMessages: [
        {
          timestamp: new Date(Date.now() - 3600000 * 2).toISOString(),
          name: "HR 經理",
          message: "親愛的同仁好！端午佳節將至，公司備有精美禮盒，請各部門代表於週五下班前至 4 樓總務處領取。祝大家節日快樂！",
          department: "人力資源"
        },
        {
          timestamp: new Date(Date.now() - 3600000 * 18).toISOString(),
          name: "匿名員工",
          message: "感謝產品設計組的大家！這次的新版系統操作非常流暢，省去了好多行政流程，真是太讚了！🚀",
          department: "產品設計"
        },
        {
          timestamp: new Date(Date.now() - 3600000 * 30).toISOString(),
          name: "RD 部長",
          message: "提醒大家，這週四晚上 11:00 將進行資料庫維護升級，屆時測試主機會短暫中斷 15 分鐘，請大家提前安排工作。",
          department: "技術研發"
        }
      ]
    };

    // --- DOM 節點初始化 ---
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');
    const connectionStatusBadge = document.getElementById('connectionStatusBadge');
    const statusText = document.getElementById('statusText');
    const toastContainer = document.getElementById('toastContainer');

    const anonymousToggle = document.getElementById('anonymousToggle');
    const nameInputWrapper = document.getElementById('nameInputWrapper');
    const nameInput = document.getElementById('nameInput');
    const deptSelect = document.getElementById('deptSelect');
    const messageInput = document.getElementById('messageInput');
    const charCounter = document.getElementById('charCounter');
    const messageForm = document.getElementById('messageForm');
    const submitBtn = document.getElementById('submitBtn');

    const tabPublic = document.getElementById('tabPublic');
    const tabOutbox = document.getElementById('tabOutbox');
    const outboxBadge = document.getElementById('outboxBadge');
    const searchInput = document.getElementById('searchInput');
    const refreshBtn = document.getElementById('refreshBtn');
    const refreshIcon = document.getElementById('refreshIcon');
    const messageListContainer = document.getElementById('messageListContainer');
    const emptyState = document.getElementById('emptyState');

    // --- 本地儲存與載入設定 ---
    function loadSettings() {
      // 驗證是否已填入真實網址
      const isConfigured = state.apiUrl && !state.apiUrl.includes('YOUR_DEPLOYED_GAS_ID_HERE');
      updateConnectionStatus(isConfigured);

      // 載入個人發送歷史
      const savedOutbox = localStorage.getItem('gas_board_outbox');
      if (savedOutbox) {
        state.outboxMessages = JSON.parse(savedOutbox);
        updateOutboxBadge();
      }

      // 載入深色模式
      const savedTheme = localStorage.getItem('gas_board_theme') || 'dark';
      state.theme = savedTheme;
      applyTheme();
    }

    // --- 更新連線狀態 UI ---
    function updateConnectionStatus(isConnected) {
      if (isConnected) {
        connectionStatusBadge.className = "px-3 py-1.5 rounded-xl text-xs font-semibold flex items-center space-x-1.5 bg-green-500/10 text-green-600 dark:text-green-400";
        statusText.textContent = "雲端 API 已連線";
      } else {
        connectionStatusBadge.className = "px-3 py-1.5 rounded-xl text-xs font-semibold flex items-center space-x-1.5 bg-amber-500/10 text-amber-600 dark:text-amber-400";
        statusText.textContent = "本地模擬模式";
      }
    }

    // --- 介面主題切換 ---
    function applyTheme() {
      if (state.theme === 'dark') {
        document.documentElement.classList.add('dark');
        sunIcon.classList.remove('hidden');
        moonIcon.classList.add('hidden');
      } else {
        document.documentElement.classList.remove('dark');
        sunIcon.classList.add('hidden');
        moonIcon.classList.remove('hidden');
      }
    }

    themeToggleBtn.addEventListener('click', () => {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('gas_board_theme', state.theme);
      applyTheme();
    });

    // --- 匿名發言邏輯處理 ---
    anonymousToggle.addEventListener('change', (e) => {
      if (e.target.checked) {
        nameInputWrapper.classList.add('opacity-50');
        nameInput.disabled = true;
        nameInput.value = '匿名員工';
        nameInput.removeAttribute('required');
      } else {
        nameInputWrapper.classList.remove('opacity-50');
        nameInput.disabled = false;
        nameInput.value = '';
        nameInput.setAttribute('required', 'required');
      }
    });

    // --- 字數計算器 ---
    messageInput.addEventListener('input', (e) => {
      const length = e.target.value.length;
      charCounter.textContent = `${length} / 500`;
      if (length >= 480) {
        charCounter.className = "text-[11px] text-amber-500 font-mono";
      } else if (length >= 500) {
        charCounter.className = "text-[11px] text-rose-500 font-mono";
      } else {
        charCounter.className = "text-[11px] text-slate-400 dark:text-slate-500 font-mono";
      }
    });

    // --- Toast 提示功能 ---
    function showToast(text, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `flex items-center space-x-2 px-4 py-3 rounded-2xl shadow-xl transition-all transform translate-y-4 opacity-0 pointer-events-auto duration-300 max-w-sm border`;
      
      let icon = '';
      if (type === 'success') {
        toast.className += ' bg-green-500/10 border-green-500/20 text-green-700 dark:text-green-300';
        icon = `<svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`;
      } else if (type === 'error') {
        toast.className += ' bg-rose-500/10 border-rose-500/20 text-rose-700 dark:text-rose-300';
        icon = `<svg class="w-5 h-5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`;
      } else {
        toast.className += ' bg-blue-500/10 border-blue-500/20 text-blue-700 dark:text-blue-300';
        icon = `<svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`;
      }

      toast.innerHTML = `${icon}<span class="text-xs font-semibold">${text}</span>`;
      toastContainer.appendChild(toast);

      setTimeout(() => {
        toast.classList.remove('translate-y-4', 'opacity-0');
      }, 50);

      setTimeout(() => {
        toast.classList.add('translate-y-2', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // --- 更新發件箱 Badge 顯示 ---
    function updateOutboxBadge() {
      const count = state.outboxMessages.length;
      if (count > 0) {
        outboxBadge.textContent = count;
        outboxBadge.classList.remove('hidden');
      } else {
        outboxBadge.classList.add('hidden');
      }
    }

    // --- 分頁頁籤點擊與轉換 ---
    tabPublic.addEventListener('click', () => {
      state.activeTab = 'public';
      tabPublic.className = "flex-1 pb-4 text-center font-bold text-sm border-b-2 border-brand-500 text-brand-500 transition-all flex items-center justify-center space-x-2";
      tabOutbox.className = "flex-1 pb-4 text-center font-bold text-sm border-b-2 border-transparent text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-all flex items-center justify-center space-x-2";
      renderMessages();
    });

    tabOutbox.addEventListener('click', () => {
      state.activeTab = 'outbox';
      tabOutbox.className = "flex-1 pb-4 text-center font-bold text-sm border-b-2 border-brand-500 text-brand-500 transition-all flex items-center justify-center space-x-2";
      tabPublic.className = "flex-1 pb-4 text-center font-bold text-sm border-b-2 border-transparent text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-all flex items-center justify-center space-x-2";
      renderMessages();
    });

    // 搜尋輸入框事件
    searchInput.addEventListener('input', (e) => {
      state.searchTerm = e.target.value.trim().toLowerCase();
      renderMessages();
    });

    // --- 格式化時間 ---
    function formatDate(isoString) {
      if (!isoString) return '剛剛';
      try {
        const date = new Date(isoString);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);

        if (diffMins < 1) return '剛剛';
        if (diffMins < 60) return `${diffMins} 分鐘前`;
        if (diffHours < 24) return `${diffHours} 小時前`;
        
        return `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
      } catch (e) {
        return '剛剛';
      }
    }

    // --- 取得部門專屬標籤顏色 ---
    function getDeptBadgeStyle(dept) {
      const d = String(dept || '');
      switch (d) {
        case '技術研發':
          return 'bg-blue-500/10 text-blue-600 dark:text-blue-400';
        case '人力資源':
          return 'bg-purple-500/10 text-purple-600 dark:text-purple-400';
        case '行政總務':
          return 'bg-amber-500/10 text-amber-600 dark:text-amber-400';
        case '產品設計':
          return 'bg-emerald-500/10 text-emerald-600 dark:text-emerald-400';
        case '市場行銷':
          return 'bg-pink-500/10 text-pink-600 dark:text-pink-400';
        default:
          return 'bg-slate-500/10 text-slate-600 dark:text-slate-400';
      }
    }

    // --- 渲染留言列表 ---
    function renderMessages() {
      messageListContainer.innerHTML = '';
      
      const isConfigured = state.apiUrl && !state.apiUrl.includes('YOUR_DEPLOYED_GAS_ID_HERE');
      let baseMessages = [];
      if (state.activeTab === 'public') {
        baseMessages = isConfigured ? state.publicMessages : state.mockMessages;
      } else {
        baseMessages = state.outboxMessages;
      }

      // 過濾搜尋
      let filtered = baseMessages;
      if (state.searchTerm) {
        filtered = baseMessages.filter(item => {
          const messageStr = String(item.message || '').toLowerCase();
          const nameStr = String(item.name || '').toLowerCase();
          const deptStr = String(item.department || '').toLowerCase();
          return messageStr.includes(state.searchTerm) ||
                 nameStr.includes(state.searchTerm) ||
                 deptStr.includes(state.searchTerm);
        });
      }

      if (filtered.length === 0) {
        emptyState.classList.remove('hidden');
        return;
      } else {
        emptyState.classList.add('hidden');
      }

      filtered.forEach((item) => {
        const card = document.createElement('div');
        card.className = `p-5 rounded-3xl border border-slate-200/60 dark:border-slate-800/60 bg-white/60 dark:bg-slate-900/60 transition-all hover:shadow-lg hover:border-slate-300 dark:hover:border-slate-700 flex flex-col justify-between space-y-4`;
        
        const nameStr = String(item.name || '');
        const messageStr = String(item.message || '');
        const deptStr = String(item.department || '一般通用');

        const isAnon = nameStr.includes('匿名');
        const avatarBg = isAnon ? 'bg-slate-200 dark:bg-slate-800' : 'bg-gradient-to-tr from-brand-500 to-indigo-500 text-white';
        
        const avatarContent = isAnon 
          ? `<svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>`
          : `<span class="font-bold text-xs">${nameStr.charAt(0)}</span>`;

        card.innerHTML = `
          <div class="flex items-start justify-between space-x-3">
            <div class="flex items-center space-x-3">
              <div class="w-9 h-9 rounded-xl flex items-center justify-center ${avatarBg}">
                ${avatarContent}
              </div>
              <div>
                <div class="font-bold text-sm text-slate-900 dark:text-slate-100 flex items-center space-x-1.5">
                  <span>${nameStr}</span>
                  ${isAnon ? '<span class="text-[10px] text-slate-400 dark:text-slate-500 font-normal">已安全遮蔽個資</span>' : ''}
                </div>
                <div class="text-[11px] text-slate-400 dark:text-slate-500 mt-0.5">${formatDate(item.timestamp)}</div>
              </div>
            </div>
            
            <span class="px-2.5 py-1 rounded-lg text-xs font-semibold ${getDeptBadgeStyle(deptStr)}">
              ${deptStr}
            </span>
          </div>

          <p class="text-sm text-slate-700 dark:text-slate-300 leading-relaxed break-words whitespace-pre-wrap">${messageStr}</p>
        `;

        messageListContainer.appendChild(card);
      });
    }

    // --- 透過 fetch 從服務器載入最新數據 ---
    async function fetchMessagesFromServer() {
      const isConfigured = state.apiUrl && !state.apiUrl.includes('YOUR_DEPLOYED_GAS_ID_HERE');
      if (!isConfigured) return;

      refreshIcon.classList.add('animate-spin');
      refreshBtn.disabled = true;

      try {
        const fetchUrl = `${state.apiUrl}?action=read`;
        const response = await fetch(fetchUrl);
        if (!response.ok) throw new Error('讀取失敗');
        const data = await response.json();
        
        if (Array.isArray(data)) {
          state.publicMessages = data;
          showToast(`成功同步 ${data.length} 筆最新的留言`, 'success');
        } else {
          showToast('伺服器回傳格式不正確。', 'error');
        }
      } catch (err) {
        console.error(err);
        showToast('無法同步雲端留言。請確認 Web App 已更新部署，並開放存取權為「任何人 (Anyone)」。', 'error');
      } finally {
        refreshIcon.classList.remove('animate-spin');
        refreshBtn.disabled = false;
        renderMessages();
      }
    }

    // --- 提交留言到 Google Sheets ---
    messageForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = nameInput.value.trim();
      const message = messageInput.value.trim();
      const department = deptSelect.value;
      const timestamp = new Date().toISOString();

      if (!message) {
        showToast('留言內容不能為空！', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = `
        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>提交中，請稍候...</span>
      `;

      const payload = { name, message, department };
      const isConfigured = state.apiUrl && !state.apiUrl.includes('YOUR_DEPLOYED_GAS_ID_HERE');

      // 1. 如果有設定真實 API URL，使用 fetch POST 請求
      if (isConfigured) {
        try {
          // 利用 no-cors 模式確保 POST 請求可順利跨網域到達 GAS 伺服器
          await fetch(state.apiUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          showToast('留言送出成功！', 'success');
        } catch (error) {
          console.error(error);
          showToast('寫入失敗，請確認 API 設定是否正確！', 'error');
        }
      } else {
        showToast('[模擬模式] 留言成功模擬寫入！', 'success');
      }

      // 2. 追加至本地發送紀錄
      saveToLocalOutbox(timestamp, name, message, department);

      // 3. 重設表單狀態
      messageInput.value = '';
      charCounter.textContent = '0 / 500';
      if (!anonymousToggle.checked) {
        nameInput.value = '';
      }
      
      submitBtn.disabled = false;
      submitBtn.innerHTML = `
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
        </svg>
        <span>送出留言</span>
      `;

      // 4. 若有設定 API，在背景自動同步最新公用留言
      if (isConfigured) {
        setTimeout(fetchMessagesFromServer, 1000);
      } else {
        renderMessages();
      }
    });

    function saveToLocalOutbox(timestamp, name, message, department) {
      const newLocalMsg = { timestamp, name, message, department };
      state.outboxMessages.unshift(newLocalMsg);
      localStorage.setItem('gas_board_outbox', JSON.stringify(state.outboxMessages));
      updateOutboxBadge();
    }

    // 重新整理按鈕事件
    refreshBtn.addEventListener('click', () => {
      const isConfigured = state.apiUrl && !state.apiUrl.includes('YOUR_DEPLOYED_GAS_ID_HERE');
      if (isConfigured) {
        fetchMessagesFromServer();
      } else {
        showToast('目前為模擬模式，無需重新載入。請至 index.html 頂部設定變數！', 'info');
      }
    });

    // --- 頁面載入完成初始化 ---
    window.addEventListener('DOMContentLoaded', () => {
      loadSettings();
      renderMessages();
      const isConfigured = state.apiUrl && !state.apiUrl.includes('YOUR_DEPLOYED_GAS_ID_HERE');
      if (isConfigured) {
        fetchMessagesFromServer();
      }
    });
  </script>
</body>
</html>
