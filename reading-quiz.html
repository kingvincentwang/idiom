<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成語故事閱讀測驗</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a2a6c 0%, #2d4a8a 50%, #1a2a6c 100%);
    display: flex; justify-content: center; align-items: flex-start;
    padding: 24px 12px; color: #fff;
  }
  .card {
    width: 100%; max-width: 720px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px; padding: 32px 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  h1 { font-size: 26px; text-align: center; margin-bottom: 6px; letter-spacing: 2px; }
  .subtitle { text-align: center; color: rgba(255,255,255,0.65); font-size: 14px; margin-bottom: 24px; }
  label { display: block; font-size: 14px; margin: 14px 0 6px; color: rgba(255,255,255,0.85); }
  input {
    width: 100%; padding: 12px 14px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.12); color: #fff; font-size: 16px; outline: none;
  }
  input::placeholder { color: rgba(255,255,255,0.4); }
  button {
    width: 100%; margin-top: 22px; padding: 14px;
    border: none; border-radius: 12px; cursor: pointer;
    font-size: 17px; font-weight: 700; letter-spacing: 2px;
    background: linear-gradient(135deg, #ffb347, #ff8c42);
    color: #3a2200; transition: transform .15s, box-shadow .15s;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(255,140,66,0.4); }
  button:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .hidden { display: none !important; }

  /* 故事選擇 */
  .story-card {
    padding: 16px 18px; margin: 12px 0; border-radius: 14px; cursor: pointer;
    background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
    transition: background .15s, border-color .15s;
  }
  .story-card:hover { background: rgba(255,255,255,0.18); }
  .story-card.selected { border-color: #ffb347; background: rgba(255,179,71,0.18); }
  .story-card .st-title { font-size: 18px; font-weight: 700; color: #ffd9a0; letter-spacing: 2px; }
  .story-card .st-info { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; }

  /* 測驗畫面 */
  .progress-bar { height: 8px; background: rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden; margin-bottom: 18px; }
  .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #ffb347, #ff8c42); transition: width .3s; }
  .idiom-tag {
    display: inline-block; padding: 4px 16px; border-radius: 999px;
    background: rgba(255,179,71,0.2); border: 1px solid rgba(255,179,71,0.5);
    color: #ffd9a0; font-size: 16px; font-weight: 700; letter-spacing: 3px; margin-bottom: 12px;
  }
  .passage {
    background: rgba(0,0,0,0.22); border-left: 4px solid #ffb347;
    padding: 16px 18px; border-radius: 10px; line-height: 1.9;
    font-size: 16px; margin-bottom: 8px; white-space: pre-wrap;
  }
  .toggle-passage {
    width: auto; margin: 0 0 16px; padding: 6px 16px; font-size: 13px; letter-spacing: 1px;
    background: rgba(255,255,255,0.15); color: #fff;
  }
  .q-index { font-size: 13px; color: rgba(255,255,255,0.6); margin: 10px 0; }
  .question-text { font-size: 18px; font-weight: 700; line-height: 1.7; margin-bottom: 16px; }
  .option {
    display: block; width: 100%; text-align: left; margin: 10px 0; padding: 14px 16px;
    border-radius: 12px; border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.1); color: #fff; font-size: 16px; line-height: 1.6;
    cursor: pointer; transition: background .15s; letter-spacing: normal; font-weight: 400;
  }
  .option:hover { background: rgba(255,255,255,0.2); transform: none; box-shadow: none; }
  .option.correct { background: rgba(76,175,80,0.45); border-color: #4caf50; }
  .option.wrong { background: rgba(244,67,54,0.45); border-color: #f44336; }
  .feedback { margin-top: 14px; padding: 14px 16px; border-radius: 10px; font-size: 15px; line-height: 1.8; background: rgba(0,0,0,0.25); }
  .feedback .fb-title { font-weight: 700; margin-bottom: 4px; }

  /* 結果畫面 */
  .score-big { text-align: center; font-size: 56px; font-weight: 900; color: #ffb347; margin: 10px 0; }
  .score-sub { text-align: center; color: rgba(255,255,255,0.7); margin-bottom: 20px; }
  .review-item {
    padding: 12px 14px; margin: 8px 0; border-radius: 10px;
    background: rgba(255,255,255,0.08); font-size: 14px; line-height: 1.7;
  }
  .review-item.ok { border-left: 4px solid #4caf50; }
  .review-item.ng { border-left: 4px solid #f44336; }
  .save-status { text-align: center; font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 14px; }
  .loading { text-align: center; padding: 40px 0; font-size: 16px; color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
<div class="card">

  <!-- 步驟一:基本資料 -->
  <div id="startScreen">
    <h1>📖 成語故事閱讀測驗</h1>
    <div class="subtitle">關西國小 · 讀一個故事,回答五個問題</div>
    <label>班級</label>
    <input id="inpClass" placeholder="例:五年甲班">
    <label>座號</label>
    <input id="inpSeat" type="number" placeholder="例:12">
    <label>姓名</label>
    <input id="inpName" placeholder="請輸入姓名">
    <button id="btnToStories">下一步:選擇故事 ➜</button>
  </div>

  <!-- 步驟二:選擇故事 -->
  <div id="storyScreen" class="hidden">
    <h1>📚 選擇一個故事</h1>
    <div class="subtitle">點選你要挑戰的成語故事</div>
    <div id="storyList" class="loading">故事載入中…</div>
    <button id="btnStartQuiz" disabled>開始測驗</button>
  </div>

  <!-- 步驟三:測驗 -->
  <div id="quizScreen" class="hidden">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div><span class="idiom-tag" id="idiomTag"></span></div>
    <div class="passage" id="passage"></div>
    <button class="toggle-passage" id="btnTogglePassage">📖 收起短文</button>
    <div class="q-index" id="qIndex"></div>
    <div class="question-text" id="questionText"></div>
    <div id="options"></div>
    <div class="feedback hidden" id="feedback"></div>
    <button id="btnNext" class="hidden">下一題 ➜</button>
  </div>

  <!-- 步驟四:結果 -->
  <div id="resultScreen" class="hidden">
    <h1>🎉 測驗完成</h1>
    <div class="score-big" id="finalScore"></div>
    <div class="score-sub" id="finalSub"></div>
    <div id="reviewList"></div>
    <div class="save-status" id="saveStatus">成績儲存中…</div>
    <button onclick="location.reload()">挑戰其他故事</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, getDocs, addDoc, query, where, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ★★★ 請替換成你自己的 Firebase 專案設定 ★★★
const firebaseConfig = {
  apiKey: "AIzaSyAcYIht_1YLJBM-kvglMDo2xS7yAFbyy8U",
  authDomain: "reading-quiz-6c307.firebaseapp.com",
  projectId: "reading-quiz-6c307",
  storageBucket: "reading-quiz-6c307.firebasestorage.app",
  messagingSenderId: "1056203461050",
  appId: "1:1056203461050:web:85aabbd841a77109dccd83"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== Web Audio 音效 =====
let audioCtx = null;
function beep(freqs, dur) {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    freqs.forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "sine"; o.frequency.value = f;
      g.gain.setValueAtTime(0.15, audioCtx.currentTime + i * dur);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (i + 1) * dur);
      o.connect(g).connect(audioCtx.destination);
      o.start(audioCtx.currentTime + i * dur);
      o.stop(audioCtx.currentTime + (i + 1) * dur);
    });
  } catch (e) {}
}
const soundCorrect = () => beep([523, 659, 784], 0.12);
const soundWrong = () => beep([220, 165], 0.18);
const soundFinish = () => beep([523, 659, 784, 1047], 0.15);

// ===== 狀態 =====
let stories = [];
let selectedStory = null;
let current = 0;
let score = 0;
let details = [];
let student = {};
let answered = false;

const $ = id => document.getElementById(id);
const show = id => $(id).classList.remove("hidden");
const hide = id => $(id).classList.add("hidden");
const esc = s => String(s ?? "").replace(/[&<>"']/g, m =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ===== 步驟一 → 步驟二:載入故事列表 =====
$("btnToStories").addEventListener("click", async () => {
  const cls = $("inpClass").value.trim();
  const seat = $("inpSeat").value.trim();
  const name = $("inpName").value.trim();
  if (!cls || !seat || !name) { alert("請完整填寫班級、座號、姓名"); return; }
  student = { className: cls, seat, name };

  hide("startScreen"); show("storyScreen");
  try {
    const q = query(collection(db, "idiom_stories"), where("enabled", "==", true));
    const snap = await getDocs(q);
    stories = [];
    snap.forEach(d => stories.push({ id: d.id, ...d.data() }));
    stories.sort((a, b) => (a.title || "").localeCompare(b.title || "", "zh-Hant"));

    if (stories.length === 0) {
      $("storyList").innerHTML = "<div class='loading'>目前沒有可用的故事,請聯絡老師。</div>";
      return;
    }
    $("storyList").classList.remove("loading");
    $("storyList").innerHTML = stories.map((s, i) => `
      <div class="story-card" data-idx="${i}">
        <div class="st-title">${esc(s.title)}</div>
        <div class="st-info">共 ${(s.questions || []).length} 題 · 短文約 ${(s.passage || "").length} 字</div>
      </div>`).join("");

    document.querySelectorAll(".story-card").forEach(card => {
      card.addEventListener("click", () => {
        document.querySelectorAll(".story-card").forEach(c => c.classList.remove("selected"));
        card.classList.add("selected");
        selectedStory = stories[Number(card.dataset.idx)];
        $("btnStartQuiz").disabled = false;
      });
    });
  } catch (err) {
    console.error(err);
    $("storyList").innerHTML = `<div class='loading'>故事載入失敗:${esc(err.message)}</div>`;
  }
});

// ===== 步驟二 → 步驟三:開始測驗 =====
$("btnStartQuiz").addEventListener("click", () => {
  if (!selectedStory) return;
  current = 0; score = 0; details = [];
  hide("storyScreen"); show("quizScreen");
  $("idiomTag").textContent = selectedStory.title;
  $("passage").textContent = selectedStory.passage || "";
  renderQuestion();
});

// 收起/展開短文
$("btnTogglePassage").addEventListener("click", () => {
  const p = $("passage");
  const collapsed = p.classList.toggle("hidden");
  $("btnTogglePassage").textContent = collapsed ? "📖 展開短文" : "📖 收起短文";
});

// ===== 顯示題目 =====
function renderQuestion() {
  answered = false;
  const qs = selectedStory.questions;
  const q = qs[current];
  $("progressFill").style.width = (current / qs.length * 100) + "%";
  $("qIndex").textContent = `第 ${current + 1} 題 / 共 ${qs.length} 題`;
  $("questionText").textContent = q.question;
  hide("feedback"); hide("btnNext");

  const box = $("options");
  box.innerHTML = "";
  const opts = q.options.map((text, idx) => ({ text, idx }));
  shuffle(opts);
  opts.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt.text;
    btn.addEventListener("click", () => selectAnswer(btn, opt.idx, q));
    box.appendChild(btn);
  });
}

// ===== 作答 + 立即回饋 =====
function selectAnswer(btn, chosenIdx, q) {
  if (answered) return;
  answered = true;
  const isCorrect = chosenIdx === q.answer;
  if (isCorrect) { score++; btn.classList.add("correct"); soundCorrect(); }
  else {
    btn.classList.add("wrong"); soundWrong();
    document.querySelectorAll("#options .option").forEach(b => {
      if (b.textContent === q.options[q.answer]) b.classList.add("correct");
    });
  }
  details.push({ question: q.question, correct: isCorrect });

  const fb = $("feedback");
  fb.innerHTML = `<div class="fb-title">${isCorrect ? "✅ 答對了!" : "❌ 答錯了"}</div>` +
    `<div>正確答案:${esc(q.options[q.answer])}</div>` +
    (q.explanation ? `<div>💡 ${esc(q.explanation)}</div>` : "");
  show("feedback");

  $("btnNext").textContent = current === selectedStory.questions.length - 1 ? "看成績 🏁" : "下一題 ➜";
  show("btnNext");
}

$("btnNext").addEventListener("click", () => {
  current++;
  if (current < selectedStory.questions.length) renderQuestion();
  else finishQuiz();
});

// ===== 結束 & 儲存 =====
async function finishQuiz() {
  hide("quizScreen"); show("resultScreen");
  soundFinish();
  const total = selectedStory.questions.length;
  const pct = Math.round(score / total * 100);
  $("finalScore").textContent = `${score} / ${total}`;
  $("finalSub").textContent = `【${selectedStory.title}】 ${student.className} ${student.seat}號 ${student.name} · 答對率 ${pct}%`;

  $("reviewList").innerHTML = details.map((d, i) =>
    `<div class="review-item ${d.correct ? "ok" : "ng"}">` +
    `${d.correct ? "✅" : "❌"} 第 ${i + 1} 題:${esc(d.question)}</div>`
  ).join("");

  try {
    await addDoc(collection(db, "quiz_results"), {
      storyId: selectedStory.id,
      storyTitle: selectedStory.title,
      ...student,
      score, total, percent: pct, details,
      createdAt: serverTimestamp()
    });
    $("saveStatus").textContent = "✅ 成績已成功儲存";
  } catch (err) {
    console.error(err);
    $("saveStatus").textContent = "⚠️ 成績儲存失敗:" + err.message;
  }
}
</script>
</body>
</html>
