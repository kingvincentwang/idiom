<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>班級榮譽榜名單提報</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        .loader {
            border-top-color: #3498db;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10">
        <h1 class="text-xl font-bold text-center">🏆 榮譽榜名單提報</h1>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <div id="loadingScreen" class="flex flex-col items-center justify-center py-10">
            <div class="loader ease-linear rounded-full border-4 border-gray-200 h-12 w-12 mb-4"></div>
            <p class="text-gray-500 font-medium">正在初始化系統...</p>
        </div>

        <div id="profileSection" class="hidden bg-white rounded-xl shadow-sm p-4 mb-4 flex items-center space-x-4 border-l-4 border-blue-500">
            <img id="userPicture" src="" alt="頭像" class="w-12 h-12 rounded-full bg-gray-200 object-cover">
            <div>
                <p class="text-sm text-gray-500">目前填表人</p>
                <p id="userName" class="font-bold text-lg text-gray-800">載入中...</p>
            </div>
        </div>

        <form id="surveyForm" class="hidden bg-white rounded-xl shadow-sm p-5 space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">請選擇提報獎項 <span class="text-red-500">*</span></label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="awardType" value="前五名" class="peer sr-only" checked>
                        <div class="text-center p-3 rounded-lg border-2 border-gray-200 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 font-medium transition-all">
                            🥇 前五名
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="awardType" value="進步獎" class="peer sr-only">
                        <div class="text-center p-3 rounded-lg border-2 border-gray-200 peer-checked:border-green-500 peer-checked:bg-green-50 peer-checked:text-green-700 font-medium transition-all">
                            📈 進步獎
                        </div>
                    </label>
                </div>
            </div>

            <div id="rankContainer" class="transition-all duration-300">
                <label for="rankSelect" class="block text-sm font-semibold text-gray-700 mb-2">名次 <span class="text-red-500">*</span></label>
                <select id="rankSelect" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" required>
                    <option value="" disabled selected>請選擇名次</option>
                    <option value="第1名">第 1 名</option>
                    <option value="第2名">第 2 名</option>
                    <option value="第3名">第 3 名</option>
                    <option value="第4名">第 4 名</option>
                    <option value="第5名">第 5 名</option>
                </select>
            </div>

            <div>
                <label for="studentName" class="block text-sm font-semibold text-gray-700 mb-2">學生姓名 <span class="text-red-500">*</span></label>
                <input type="text" id="studentName" placeholder="請輸入學生真實姓名" required class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <button type="submit" id="submitBtn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition duration-200 flex justify-center items-center">
                確認送出提報
            </button>
        </form>

        <div id="successScreen" class="hidden text-center py-10 bg-white rounded-xl shadow-sm p-6 mt-4">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">提報成功！</h2>
            <p class="text-gray-500 mb-6">資料已成功寫入資料庫。</p>
            <button id="closeAppBtn" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-3 px-4 rounded-lg transition duration-200">
                關閉視窗
            </button>
            <button id="submitAnotherBtn" class="w-full mt-3 text-blue-600 font-medium py-2">
                繼續提報下一位
            </button>
        </div>
    </main>

    <script>
        // ==========================================
        // ⚠️ 請填寫您的設定 ⚠️
        // ==========================================
        const MY_LIFF_ID = "2009635542-RKIIQluE"; // 替換為您的 LIFF ID
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwhJlc1-8Q9Jo_B_oxuSuOLSQdIq9U1qHcDqil-EUAxXJe-Jg4mXta9Fub3_AiFJuD33w/exec"; // 替換為您部署後的 GAS 網頁應用程式 URL
        // ==========================================

        const loadingScreen = document.getElementById('loadingScreen');
        const profileSection = document.getElementById('profileSection');
        const surveyForm = document.getElementById('surveyForm');
        const successScreen = document.getElementById('successScreen');
        const userNameEl = document.getElementById('userName');
        const userPictureEl = document.getElementById('userPicture');
        const rankContainer = document.getElementById('rankContainer');
        const awardTypeRadios = document.getElementsByName('awardType');
        const rankSelect = document.getElementById('rankSelect');
        const studentNameInput = document.getElementById('studentName');
        const submitBtn = document.getElementById('submitBtn');

        let currentUserProfile = null;

        async function initializeLiff() {
            try {
                if (MY_LIFF_ID === "YOUR_LIFF_ID") {
                    console.warn("尚未設定 LIFF ID，使用測試模式");
                    showFormWithMockData();
                    return;
                }

                await liff.init({ liffId: MY_LIFF_ID });
                
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    currentUserProfile = profile;
                    
                    userNameEl.textContent = profile.displayName;
                    if (profile.pictureUrl) {
                        userPictureEl.src = profile.pictureUrl;
                    }
                    
                    loadingScreen.classList.add('hidden');
                    profileSection.classList.remove('hidden');
                    surveyForm.classList.remove('hidden');
                } else {
                    liff.login();
                }
            } catch (error) {
                console.error('LIFF 初始化失敗', error);
                alert("系統初始化失敗，請稍後再試。");
            }
        }

        function showFormWithMockData() {
            currentUserProfile = { userId: "test_user_id", displayName: "測試教師" };
            userNameEl.textContent = currentUserProfile.displayName;
            loadingScreen.classList.add('hidden');
            profileSection.classList.remove('hidden');
            surveyForm.classList.remove('hidden');
        }

        awardTypeRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.value === '進步獎') {
                    rankContainer.classList.add('hidden');
                    rankSelect.removeAttribute('required');
                    rankSelect.value = ""; 
                } else {
                    rankContainer.classList.remove('hidden');
                    rankSelect.setAttribute('required', 'true');
                }
            });
        });

        surveyForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const selectedAward = document.querySelector('input[name="awardType"]:checked').value;
            const rank = rankSelect.value;
            const studentName = studentNameInput.value.trim();

            if (selectedAward === '前五名' && !rank) {
                alert('請選擇名次！');
                return;
            }

            const payload = {
                submitterName: currentUserProfile.displayName,
                submitterId: currentUserProfile.userId,
                awardType: selectedAward,
                rankOrNote: rank || "無",
                studentName: studentName
            };

            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<div class="loader ease-linear rounded-full border-2 border-white h-5 w-5 mr-2"></div> 傳送中...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70');

            try {
                if (GAS_API_URL === "YOUR_GAS_API_URL") {
                    throw new Error("尚未設定 Google Apps Script API 網址");
                }

                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.status === "success") {
                    profileSection.classList.add('hidden');
                    surveyForm.classList.add('hidden');
                    successScreen.classList.remove('hidden');
                } else {
                    throw new Error(result.message || "未知錯誤");
                }
            } catch (error) {
                console.error('資料傳送失敗:', error);
                alert('傳送失敗：' + error.message);
            } finally {
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70');
            }
        });

        document.getElementById('closeAppBtn').addEventListener('click', () => {
            if (liff.isInClient()) {
                liff.closeWindow();
            } else {
                alert('請直接關閉此瀏覽器分頁。');
            }
        });

        document.getElementById('submitAnotherBtn').addEventListener('click', () => {
            studentNameInput.value = "";
            rankSelect.value = "";
            successScreen.classList.add('hidden');
            profileSection.classList.remove('hidden');
            surveyForm.classList.remove('hidden');
        });

        window.addEventListener('load', initializeLiff);
    </script>
</body>
</html>
