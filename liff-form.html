<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>班級榮譽榜名單提報</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        .loader {
            border-top-color: #3498db;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10">
        <h1 class="text-xl font-bold text-center">🏆 班級榮譽榜名單提報</h1>
    </header>

    <main class="p-4 max-w-md mx-auto pb-10">
        <div id="loadingScreen" class="flex flex-col items-center justify-center py-10">
            <div class="loader ease-linear rounded-full border-4 border-gray-200 h-12 w-12 mb-4"></div>
            <p class="text-gray-500 font-medium">正在初始化系統...</p>
        </div>

        <div id="profileSection" class="hidden bg-white rounded-xl shadow-sm p-4 mb-4 flex items-center space-x-4 border-l-4 border-blue-500">
            <img id="userPicture" src="" alt="頭像" class="w-12 h-12 rounded-full bg-gray-200 object-cover">
            <div>
                <p class="text-sm text-gray-500">目前填表人</p>
                <p id="userName" class="font-bold text-lg text-gray-800">載入中...</p>
            </div>
        </div>

        <form id="surveyForm" class="hidden bg-white rounded-xl shadow-sm p-5 space-y-6">

            <div>
                <label for="classNameInput" class="block text-sm font-semibold text-gray-700 mb-2">班級 <span class="text-red-500">*</span></label>
                <input type="text" id="classNameInput" placeholder="例如：三年一班" required
                    class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <div>
                <p class="text-sm font-semibold text-gray-700 mb-2">🥇 前五名</p>
                <div class="space-y-2">
                    <input type="text" class="top5-input w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="第 1 名 姓名">
                    <input type="text" class="top5-input w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="第 2 名 姓名">
                    <input type="text" class="top5-input w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="第 3 名 姓名">
                    <input type="text" class="top5-input w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="第 4 名 姓名">
                    <input type="text" class="top5-input w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="第 5 名 姓名">
                </div>
            </div>

            <div>
                <p class="text-sm font-semibold text-gray-700 mb-2">🔁 前五名備取</p>
                <div class="space-y-2">
                    <input type="text" class="top5backup-input w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="備取 1 姓名">
                    <input type="text" class="top5backup-input w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="備取 2 姓名">
                    <input type="text" class="top5backup-input w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="備取 3 姓名">
                </div>
            </div>

            <div>
                <p class="text-sm font-semibold text-gray-700 mb-2">📈 進步獎</p>
                <div class="space-y-2">
                    <input type="text" class="improved-input w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-green-500" placeholder="進步獎 1 姓名">
                    <input type="text" class="improved-input w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-green-500" placeholder="進步獎 2 姓名">
                    <input type="text" class="improved-input w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-green-500" placeholder="進步獎 3 姓名">
                </div>
            </div>

            <div>
                <p class="text-sm font-semibold text-gray-700 mb-2">🔁 進步獎備取</p>
                <div class="space-y-2">
                    <input type="text" class="improvedbackup-input w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-green-500" placeholder="備取 1 姓名">
                    <input type="text" class="improvedbackup-input w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-green-500" placeholder="備取 2 姓名">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition duration-200 flex justify-center items-center">
                確認送出全班名單
            </button>
        </form>

        <div id="successScreen" class="hidden text-center py-10 bg-white rounded-xl shadow-sm p-6 mt-4">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">提報成功！</h2>
            <p class="text-gray-500 mb-6">全班名單已成功寫入資料庫。</p>
            <button id="closeAppBtn" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-3 px-4 rounded-lg transition duration-200">
                關閉視窗
            </button>
            <button id="submitAnotherBtn" class="w-full mt-3 text-blue-600 font-medium py-2">
                提報另一個班級
            </button>
        </div>
    </main>

    <script>
        // ==========================================
        // ⚠️ 請填寫您的設定 ⚠️
        // ==========================================
        const MY_LIFF_ID = "2010467805-6wrsAm45";
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbw8uiwTBlHOG6Mp_YKgewxHLCHvv2Sz6BpbL6M6nzJ7O-oFM6IUdBtJE6OgIrR6Dwiq/exec";
        // ==========================================

        const loadingScreen = document.getElementById('loadingScreen');
        const profileSection = document.getElementById('profileSection');
        const surveyForm = document.getElementById('surveyForm');
        const successScreen = document.getElementById('successScreen');
        const userNameEl = document.getElementById('userName');
        const userPictureEl = document.getElementById('userPicture');
        const submitBtn = document.getElementById('submitBtn');
        const classNameInput = document.getElementById('classNameInput');

        let currentUserProfile = null;

        async function initializeLiff() {
            try {
                if (MY_LIFF_ID === "YOUR_LIFF_ID") {
                    console.warn("尚未設定 LIFF ID，使用測試模式");
                    showFormWithMockData();
                    return;
                }

                await liff.init({ liffId: MY_LIFF_ID });

                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    currentUserProfile = profile;

                    userNameEl.textContent = profile.displayName;
                    if (profile.pictureUrl) {
                        userPictureEl.src = profile.pictureUrl;
                    }

                    loadingScreen.classList.add('hidden');
                    profileSection.classList.remove('hidden');
                    surveyForm.classList.remove('hidden');
                } else {
                    liff.login();
                }
            } catch (error) {
                console.error('LIFF 初始化失敗', error);
                alert("系統初始化失敗，請稍後再試。");
            }
        }

        function showFormWithMockData() {
            currentUserProfile = { userId: "test_user_id", displayName: "測試教師" };
            userNameEl.textContent = currentUserProfile.displayName;
            loadingScreen.classList.add('hidden');
            profileSection.classList.remove('hidden');
            surveyForm.classList.remove('hidden');
        }

        function collectInputs(selector) {
            return Array.from(document.querySelectorAll(selector)).map(el => el.value.trim());
        }

        surveyForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const className = classNameInput.value.trim();
            if (!className) {
                alert('請填寫班級！');
                return;
            }

            const payload = {
                submitterName: currentUserProfile.displayName,
                submitterId: currentUserProfile.userId,
                className: className,
                top5: collectInputs('.top5-input'),
                top5Backup: collectInputs('.top5backup-input'),
                improved: collectInputs('.improved-input'),
                improvedBackup: collectInputs('.improvedbackup-input')
            };

            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<div class="loader ease-linear rounded-full border-2 border-white h-5 w-5 mr-2"></div> 傳送中...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70');

            try {
                if (GAS_API_URL === "YOUR_GAS_API_URL") {
                    throw new Error("尚未設定 Google Apps Script API 網址");
                }

                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.status === "success") {
                    profileSection.classList.add('hidden');
                    surveyForm.classList.add('hidden');
                    successScreen.classList.remove('hidden');
                } else {
                    throw new Error(result.message || "未知錯誤");
                }
            } catch (error) {
                console.error('資料傳送失敗:', error);
                alert('傳送失敗：' + error.message);
            } finally {
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70');
            }
        });

        document.getElementById('closeAppBtn').addEventListener('click', () => {
            if (liff.isInClient()) {
                liff.closeWindow();
            } else {
                alert('請直接關閉此瀏覽器分頁。');
            }
        });

        document.getElementById('submitAnotherBtn').addEventListener('click', () => {
            surveyForm.reset();
            successScreen.classList.add('hidden');
            profileSection.classList.remove('hidden');
            surveyForm.classList.remove('hidden');
        });

        window.addEventListener('load', initializeLiff);
    </script>
</body>
</html>
